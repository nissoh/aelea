<!DOCTYPE html>
<html lang="en">

<head>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        @font-face {
            font-family: 'Fira Code';
            font-style: normal;
            font-weight: 300 700;
            font-display: swap;
            src: url('/fonts/firacode-latin.woff2') format('woff2');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }

        @font-face {
            font-family: 'Fira Code';
            font-style: normal;
            font-weight: 300 700;
            font-display: swap;
            src: url('/fonts/firacode-latin-ext.woff2') format('woff2');
            unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
        }

        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg)
            }
        }

        @media (pointer: fine) {
            ::-webkit-scrollbar-thumb {
                background: content-box transparent;
                border: 2px solid transparent;
                border-radius: var(--gem-sys-shape--corner-full);
                min-height: 48px;
                min-width: 48px;
            }
        }

        @media (pointer: fine) {
            ::-webkit-scrollbar,
            ::-webkit-scrollbar-corner {
                background: transparent;
                height: 12px;
                width: 12px;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }
    </style>
    <style id="aelea-theme-config">
        body.light {
            --name: 'light';
            --primary: #f00;
            --message: #000000;
            --background: #ffffff;
            --horizon: #fff5de;
            --middleground: #e0d0ab;
            --foreground: #866724;
            --positive: #0fd25e;
            --negative: #b70636;
            --indeterminate: #dccb07;
            --shade-pole: white;
        }


        body.dark {
            --name: 'dark';
            --primary: #ea607e;
            --message: #ffffff;
            --background: #151b1d;
            --horizon: #1e282b;
            --middleground: #2d363a;
            --foreground: #a5b6bd;
            --positive: #a6f5a6;
            --negative: #de3434;
            --indeterminate: #dccb07;
            --shade-pole: black;
        }
    </style>
</head>

<body>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
