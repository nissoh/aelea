name: Website Release

on:
  push:
    branches: [main, master]
    paths:
      - 'website/**'
      - 'aelea/**'
      - '.github/workflows/release.yml'
      - 'package.json'
      - 'bun.lock'
  workflow_dispatch:

# Don't cancel in-progress publishes — aborting mid-release can leave npm
# in inconsistent state. Latest run still queues, but only one release
# pipeline runs at a time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Run actions/checkout, actions/cache, etc. on Node.js 24. Defaults to
  # Node.js 24 starting 2026-06-02; setting this flips the switch early
  # and silences the deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
            aelea/node_modules
            website/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install
        run: bun install --frozen-lockfile

      # Build aelea first so the website's tsc:check (run inside `bun run lint`)
      # can resolve `aelea/*` imports through the published exports map.
      - name: Build aelea
        run: bun run aelea:build

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run --cwd aelea test

      - name: Build website
        run: bun run website:build

  release:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    # `contents: write` lets the GitHub release step create the matching
    # `vX.Y.Z` tag + Release entry via the bundled `GITHUB_TOKEN`.
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Restore bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
            aelea/node_modules
            website/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install
        run: bun install --frozen-lockfile

      # Build aelea so the publish step packs `dist/` (per package.json's `files`).
      - name: Build aelea
        run: bun run aelea:build

      # Idempotent: skips if aelea/package.json's version already matches npm.
      # Bump via `cd aelea && bun pm version <patch|minor|major>` then push.
      # Sets `published` + `version` outputs so the next step can branch on
      # whether publish actually ran (vs the no-op skip path).
      #
      # aelea ships as the UNSCOPED `aelea` package (owner: mission-andromeda).
      # secrets.NPM_AUTH must be a Granular Access Token with ALL of:
      #   - Permissions: Read and write (not read-only)
      #   - Packages: the single package `aelea` (no `@` scope entry)
      #   - Security: "Bypass two-factor authentication (2FA)" checked
      # Missing any → 403/404 at publish. Token is passed via NPM_CONFIG_TOKEN
      # env (not a workspace-child .npmrc — npm/bun silently ignore those).
      - name: Publish to npm
        id: publish
        working-directory: aelea
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_AUTH }}
        run: |
          LOCAL=$(jq -r .version package.json)
          if ! REMOTE=$(curl -sf https://registry.npmjs.org/aelea | jq -r '."dist-tags".latest'); then
            echo "::warning::Could not reach npm registry; will attempt publish and let npm reject duplicates"
            REMOTE=""
          fi
          echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "aelea@$LOCAL already published"
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          bun publish --access public
          echo "published=true" >> "$GITHUB_OUTPUT"

      # Tags the release commit and creates a GitHub Release with the matching
      # CHANGELOG section as the body. `gh release create` creates the tag
      # itself, so no separate `git tag && git push` step is needed.
      - name: Create GitHub release
        if: steps.publish.outputs.published == 'true'
        working-directory: aelea
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.publish.outputs.version }}"
          # Slice the CHANGELOG section between `## $VERSION` and the next
          # top-level `## ` heading; falls back to a one-liner if absent.
          awk -v ver="$VERSION" '
            $0 == "## " ver { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release v$VERSION" > /tmp/release-notes.md
          fi
          gh release create "v$VERSION" \
            --title "aelea v$VERSION" \
            --notes-file /tmp/release-notes.md \
            --target "$GITHUB_SHA"
