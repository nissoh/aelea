name: Check

on:
  pull_request:
  push:
    branches: [main, master]

# Cancel any superseded run on the same ref to save runner time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
            aelea/node_modules
            website/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Biome
        run: bun run biome:check

      # Build aelea first so the website's tsc:check can resolve `aelea/*`
      # imports through the published exports map (which points at dist/).
      - name: Build aelea
        run: bun run aelea:build

      - name: TypeScript
        run: bun run tsc:check

      - name: Test
        run: bun run --cwd aelea test
